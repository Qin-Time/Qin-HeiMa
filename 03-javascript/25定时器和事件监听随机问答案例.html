<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    h2 {
      text-align: center;
    }

    .box {
      width: 600px;
      margin: 50px auto;
      display: flex;
      font-size: 25px;
      line-height: 40px;
    }

    .qs {

      width: 450px;
      height: 40px;
      color: red;

    }

    .btns {
      text-align: center;
    }

    .btns button {
      width: 120px;
      height: 35px;
      margin: 0 50px;
    }
  </style>
</head>

<body>
  <h2>随机点名</h2>
  <div class="box">
    <span>名字是：</span>
    <div class="qs">这里显示姓名</div>
  </div>
  <div class="btns">
    <button class="start">开始</button>
    <button class="end">结束</button>
  </div>

  <script>
    // 数据数组
    let list = ['马超', '黄忠', '赵云', '关羽', '张飞']
    const start = document.querySelector('.start');
    const end = document.querySelector('.end');
    const qs = document.querySelector('.qs');
    let id = null;

    // 定义一个抽奖函数，返回中奖者
    function arrLottery(arr) {
      if (arr.length === 0) {
        return null;
      }
      const winnerIndex = Math.floor(Math.random() * arr.length)
      const winner = arr[winnerIndex];
      return winner;
    }

    // 定义一个开始函数，定时器滚动奖池，更新定时器ID
    function scrollingList(arr) {
      id = setInterval(function () { qs.innerHTML = arrLottery(arr) }, 500);
    }

    // 定义一个结束函数，定时器关闭，文本更新为中奖者，并从数组中剔除中奖者。
    function getWinner(arr) {
      // 1. 清除定时器，停止滚动
      clearInterval(id);
      // 3. 从数组中剔除中奖者，防止重复中奖
      if (arr.length === 0) {
        return null;
      }
      const winnerIndex = Math.floor(Math.random() * arr.length)
      const winner = arr[winnerIndex];
      if (winnerIndex > -1) {
        arr.splice(winnerIndex, 1);
      }
    }
    // 给开始按钮绑定事件，触发时调用滚动函数。
    start.addEventListener('click', function () { scrollingList(list) });
    end.addEventListener('click', function () { getWinner(list) });

  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      /* 定义为弹性盒子 需要在父盒子定义，且父盒子控制子盒子*/
      display: flex;


      /* 主轴对齐方式   justify-content: 值   */
      /* 可选值为：  flex-start 左对齐   flex-end 右对齐   space-between 两端对齐    space-around 环绕对齐    space-evenly 平均分配*/

      /* 左对齐 */
      justify-content: flex-start;
      /* 右对齐 */
      /* justify-content: flex-end; */
      /* 居中对齐   ---ABCDE--- */
      /* justify-content: center; */
      /* 两端对齐   A--B--C--D--E   */
      /* justify-content: space-between; */
      /* 环绕对齐  -A--B--C--D--E-  */
      /* justify-content: space-around; */
      /* 平均分配   -A-B-C-D-E-     */
      /* justify-content: space-evenly; */

      /* 交叉轴对齐方式 （单行时整体对齐）  align-items: 值    */
      /* 可选值为：  flex-start 靠上对齐      end 靠下对齐    center 居中对齐     stretch 拉伸(默认模式。 子盒无高度时，该模式才会生效) */

      /* 靠上对齐 */
      /* align-items: flex-start; */
      /* 靠下对齐 */
      /* align-items: end; */
      /* 居中对齐 */
      /* align-items: center; */
      /* 拉伸 默认模式。 子盒无高度时，该模式才会生效*/
      /* align-items: stretch; */

      /* 控制主轴排列方向   fleex-direction: 值    */
      /* 可选值为：  row 水平左至右   row-reverse 水平反向   column 垂直上至下    column-reverse 垂直反向  */
      /* 如果重新定义了主轴的方向，需要注意justify-content和align-items的应用要以定义的方向为准 */
      flex-direction: row;


      width: 800px;
      height: 100px;
      border: 1px solid red;
      margin: 20px 0 0 10px;
    }

    .son {
      width: 100px;
      height: 100px;
      background: green;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="son">
      <p>子盒子1</p>
    </div>
    <div class="son">
      <p>子盒子2</p>
    </div>
    <div class="son">
      <p>子盒子3</p>
    </div>
    <div class="son">
      <p>子盒子4</p>
    </div>
    <div class="son">
      <p>子盒子5</p>
    </div>
  </div>

</body>

</html>
